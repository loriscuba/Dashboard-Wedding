<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loris & Michela · 29 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>
/* === STILE ORIGINALE INVARIATO === */
:root {
  --bg: #f7f3ef;
  --text: #2b2b2b;
  --accent: #c8a27c;
  --accent2: #a07850;
  --soft: #e8ddd4;
  --white: #ffffff;
  --green: #6a9e6f;
  --red: #c0605a;
  --muted: #999;
}

body { font-family: 'Jost', sans-serif; background: var(--bg); margin:0 }

header { text-align:center; padding:40px }
h1 { font-family:'Cormorant Garamond'; font-weight:300 }

.tabs { display:flex; justify-content:center; background:white; border-bottom:1px solid var(--soft); }
.tab { padding:12px 16px; cursor:pointer; border:none; background:none; }
.tab.active { border-bottom:2px solid var(--accent); }

.panel { display:none; max-width:800px; margin:auto; padding:20px }
.panel.active { display:block }

.card { background:white; border-radius:12px; padding:15px; margin-bottom:12px }

table { width:100%; border-collapse:collapse }
td,th { padding:8px; border-bottom:1px solid #eee }

.speso-input, .note-input { border:none; border-bottom:1px dashed #ccc; background:transparent }

.btn { background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer }
.btn-ghost { background:transparent; border:1px solid var(--soft); color:var(--muted) }

.progress-wrap { height:4px; background:var(--soft); margin-top:4px }
.progress-bar { height:100%; background:var(--accent) }

</style>
</head>

<body>

<header>
<h1>Loris & Michela</h1>
<div>29 AGOSTO 2026</div>
</header>

<div class="tabs">
<button class="tab active" onclick="tab('budget',this)">💰 Budget</button>
<button class="tab" onclick="tab('rsvp',this)">💌 RSVP</button>
</div>

<!-- ================= BUDGET ================= -->
<div id="budget" class="panel active">

<div class="card">
<table>
<thead>
<tr>
<th>Voce</th>
<th>Cat</th>
<th>Min</th>
<th>Max</th>
<th>Stimato</th>
<th>Speso</th>
<th>Note</th>
<th></th>
</tr>
</thead>
<tbody id="budgetBody"></tbody>
</table>
</div>

<div class="card">
<input id="new-voce" placeholder="Voce">
<input id="new-min" type="number" placeholder="Min">
<input id="new-max" type="number" placeholder="Max">
<input id="new-stimato" type="number" placeholder="Stimato">
<button class="btn" onclick="addBudgetItem()">Aggiungi</button>
</div>

<div class="card">
<canvas id="budgetChart" height="160"></canvas>
</div>

</div>

<!-- ================= RSVP ================= -->
<div id="rsvp" class="panel">

<div class="card">
<button class="btn" onclick="loadRSVP()">Aggiorna RSVP</button>
<div id="rsvp-status"></div>
</div>

<div class="card">
<div style="font-weight:500">⚠️ Allergie da comunicare</div>
<div id="allergy-list"></div>
</div>

<div id="guests"></div>

</div>

<script>

// ===== TABS =====
function tab(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

// ===== STATE =====
let state={
  budget:[
    {voce:'Fotografo',categoria:'Servizi',min:1200,max:1500,stimato:1300,speso:0,note:''},
    {voce:'Catering',categoria:'Cibo',min:5000,max:6000,stimato:5500,speso:0,note:''}
  ]
};

// ===== BUDGET =====
function renderBudget(){
  const body=document.getElementById('budgetBody');

  body.innerHTML=state.budget.map((r,i)=>{
    const pct=r.stimato?Math.round(r.speso/r.stimato*100):0;

    return `<tr draggable="true"
      ondragstart="dragStart(${i})"
      ondragover="dragOver(event)"
      ondrop="dropRow(${i})">

<td>
<input class="note-input" value="${r.voce}" onchange="updateField(${i},'voce',this.value)">
<div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
</td>

<td>
<select onchange="updateField(${i},'categoria',this.value)">
${['Cibo','Musica','Abiti','Decorazioni','Servizi','Altro']
.map(c=>`<option ${r.categoria===c?'selected':''}>${c}</option>`).join('')}
</select>
</td>

<td><input class="speso-input" type="number" value="${r.min}" onchange="updateField(${i},'min',this.value)"></td>
<td><input class="speso-input" type="number" value="${r.max}" onchange="updateField(${i},'max',this.value)"></td>
<td><input class="speso-input" type="number" value="${r.stimato}" onchange="updateField(${i},'stimato',this.value)"></td>
<td><input class="speso-input" type="number" value="${r.speso}" onchange="updateField(${i},'speso',this.value)"></td>

<td><input class="note-input" value="${r.note}" onchange="updateField(${i},'note',this.value)"></td>

<td><button class="btn-ghost" onclick="deleteBudgetItem(${i})">✕</button></td>

</tr>`;
  }).join('');

  drawChart();
}

function updateField(i,f,v){
  if(['min','max','stimato','speso'].includes(f)) v=parseFloat(v)||0;
  state.budget[i][f]=v;
  renderBudget();
}

function addBudgetItem(){
  const voce=document.getElementById('new-voce').value.trim();
  if(!voce) return;

  state.budget.push({
    voce,
    categoria:'Altro',
    min:parseFloat(document.getElementById('new-min').value)||0,
    max:parseFloat(document.getElementById('new-max').value)||0,
    stimato:parseFloat(document.getElementById('new-stimato').value)||0,
    speso:0,
    note:''
  });

  renderBudget();
}

function deleteBudgetItem(i){
  state.budget.splice(i,1);
  renderBudget();
}

// ===== DRAG =====
let dragIndex=null;
function dragStart(i){dragIndex=i}
function dragOver(e){e.preventDefault()}
function dropRow(i){
  const item=state.budget.splice(dragIndex,1)[0];
  state.budget.splice(i,0,item);
  renderBudget();
}

// ===== CHART =====
function drawChart(){
  const c=document.getElementById('budgetChart');
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);

  let data={};
  state.budget.forEach(r=>{
    if(!data[r.categoria]) data[r.categoria]={s:0,p:0};
    data[r.categoria].s+=r.stimato;
    data[r.categoria].p+=r.speso;
  });

  const cats=Object.keys(data);
  const max=Math.max(...cats.map(c=>data[c].s),1);
  const w=c.width/(cats.length*2);

  cats.forEach((cat,i)=>{
    let x=i*w*2;
    let hs=data[cat].s/max*c.height;
    let hp=data[cat].p/max*c.height;

    ctx.fillStyle='#c8a27c';
    ctx.fillRect(x,c.height-hs,w,hs);

    ctx.fillStyle='#6a9e6f';
    ctx.fillRect(x+w,c.height-hp,w,hp);
  });
}

// ===== RSVP =====
const RSVP_URL="https://opensheet.elk.sh/1NgE7A6qhfGfxz5Wu9llxuKYlEUagRL8O5vFxn39fLnE/RSVP";

async function loadRSVP(){
  document.getElementById('rsvp-status').textContent='Caricamento...';

  const res=await fetch(RSVP_URL);
  const data=await res.json();

  let allergyMap={};

  const html=data.map(r=>{
    const allergia=(r.Allergie||'').trim();

    if(allergia && allergia.toLowerCase()!=='no'){
      if(!allergyMap[allergia]) allergyMap[allergia]=[];
      allergyMap[allergia].push(r.Nome);
    }

    return `<div class="card">${r.Nome} - ${r.Partecipazione||''}</div>`;
  }).join('');

  document.getElementById('guests').innerHTML=html;

  const allergyHTML=Object.entries(allergyMap)
  .map(([k,v])=>`<b>${k}</b> (${v.length})<br><span>${v.join(', ')}</span>`)
  .join('<br><br>');

  document.getElementById('allergy-list').innerHTML=
    allergyHTML || 'Nessuna allergia 👍';

  document.getElementById('rsvp-status').textContent='Aggiornato';
}

// ===== INIT =====
renderBudget();
loadRSVP();

</script>

</body>
</html>
