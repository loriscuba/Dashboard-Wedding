<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loris & Michela · 29 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f3ef;
  --text:#2b2b2b;
  --accent:#c8a27c;
  --soft:#e8ddd4;
  --white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  text-align:center;
  padding:60px 20px 30px;
}

.header-sub{
  letter-spacing:4px;
  font-size:11px;
  color:var(--accent);
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;
  margin:10px 0;
}

.header-date{
  font-size:13px;
  letter-spacing:3px;
  color:#777;
}

/* COUNTDOWN */
.countdown{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
  font-family:'Cormorant Garamond',serif;
}

.cd-num{font-size:26px;}
.cd-label{font-size:10px;letter-spacing:2px;}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:white;
  border-top:1px solid var(--soft);
  border-bottom:1px solid var(--soft);
}

.tab{
  border:none;
  background:none;
  padding:8px 14px;
  cursor:pointer;
  font-size:13px;
  color:#777;
}

.tab.active{
  color:var(--accent);
  border-bottom:1px solid var(--accent);
}

/* PANEL */
.panel{
  max-width:700px;
  margin:0 auto;
  padding:25px 15px;
  display:none;
}
.panel.active{display:block;}

/* CARD */
.card{
  background:white;
  border-radius:10px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

/* INPUT */
.inp{
  border:1px solid var(--soft);
  border-radius:6px;
  padding:8px;
  width:100%;
}

/* BUTTON */
.btn{
  background:var(--accent);
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* GUEST */
.guest{
  padding:10px;
  border-left:3px solid var(--accent);
  margin-bottom:6px;
  background:white;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:15px;
}

.stat{
  background:white;
  padding:12px;
  text-align:center;
  border-radius:10px;
}

/* TODO */
.todo{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
  margin-bottom:6px;
  border-radius:10px;
}
.done{opacity:.5;text-decoration:line-through;}

</style>
</head>

<body>

<header>
  <div class="header-sub">WEDDING DASHBOARD</div>
  <h1>Loris & Michela</h1>
  <div class="header-date">29 AGOSTO 2026 · CALIZZANO</div>
</header>

<div class="countdown">
  <div><div class="cd-num" id="d"></div><div class="cd-label">Giorni</div></div>
  <div><div class="cd-num" id="h"></div><div class="cd-label">Ore</div></div>
  <div><div class="cd-num" id="m"></div><div class="cd-label">Min</div></div>
  <div><div class="cd-num" id="s"></div><div class="cd-label">Sec</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="tab('budget',this)">Budget</button>
  <button class="tab" onclick="tab('rsvp',this)">RSVP</button>
  <button class="tab" onclick="tab('todo',this)">Todo</button>
</div>

<!-- BUDGET -->
<div id="budget" class="panel active">
  <div id="budgetList"></div>
</div>

<!-- RSVP -->
<div id="rsvp" class="panel">
  <div class="stats">
    <div class="stat"><div id="conf">0</div><small>Confermati</small></div>
    <div class="stat"><div id="allergy">0</div><small>Allergie</small></div>
    <div class="stat"><div id="tot">0</div><small>Totale</small></div>
  </div>

  <button class="btn" onclick="load()">Aggiorna</button>
  <div id="guests"></div>
</div>

<!-- TODO -->
<div id="todo" class="panel">
  <div id="todoList"></div>
</div>

<script>
const URL="https://opensheet.elk.sh/1NgE7A6qhfGfxz5Wu9llxuKYlEUagRL8O5vFxn39fLnE/RSVP";

function tab(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

/* COUNTDOWN */
setInterval(()=>{
  const diff=new Date("2026-08-29").getTime()-Date.now();
  document.getElementById("d").textContent=Math.floor(diff/86400000);
  document.getElementById("h").textContent=Math.floor(diff%86400000/3600000);
  document.getElementById("m").textContent=Math.floor(diff%3600000/60000);
  document.getElementById("s").textContent=Math.floor(diff%60000/1000);
},1000);

/* RSVP */
async function load(){
  const res=await fetch(URL);
  const data=await res.json();

  let ok=0,all=0;

  const html=data.map(r=>{
    const yes=/^s/i.test(r.Partecipazione||"");
    if(yes) ok++;
    if(r.Allergie && r.Allergie!=="no") all++;

    return yes?`<div class="guest">
      <b>${r.Nome}</b><br>
      🎵 ${r.Canzone||"-"}<br>
      ${r.Allergie && r.Allergie!=="no"?"⚠️ "+r.Allergie:""}
    </div>`:"";
  }).join("");

  document.getElementById("guests").innerHTML=html;
  document.getElementById("conf").textContent=ok;
  document.getElementById("allergy").textContent=all;
  document.getElementById("tot").textContent=data.length;
}

/* TODO BASE */
const todos=["Fotografo","Sala","Fiori","Musica"];
function renderTodo(){
  document.getElementById("todoList").innerHTML=
    todos.map(t=>`<div class="todo">${t}</div>`).join("");
}
renderTodo();

load();
</script>

</body>
</html>
