<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loris & Michela · 28 Agosto 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f7f3ef;
  --text:#2b2b2b;
  --accent:#c8a27c;
  --accent2:#a07850;
  --soft:#e8ddd4;
  --white:#fff;
  --green:#6a9e6f;
  --red:#c0605a;
  --orange:#d4935a;
  --yellow:#c9a840;
  --muted:#999;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Jost,sans-serif;background:var(--bg);color:var(--text)}

header{text-align:center;padding:50px 20px 20px}
h1{font-family:"Cormorant Garamond";font-size:48px;font-weight:300}

.tabs{display:flex;justify-content:center;background:#fff;border-bottom:1px solid var(--soft);position:sticky;top:0;z-index:10}
.tab{padding:14px 18px;background:none;border:none;cursor:pointer}

.panel{display:none;max-width:720px;margin:auto;padding:20px}
.panel.active{display:block}

.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:10px}
</style>
</head>

<body>

<header>
  <h1>Loris & Michela</h1>
</header>

<div class="tabs">
  <button class="tab active" onclick="tab('budget',this)">Budget</button>
  <button class="tab" onclick="tab('timeline',this)">Timeline</button>
  <button class="tab" onclick="tab('fornitori',this)">Fornitori</button>
  <button class="tab" onclick="tab('rsvp',this)">RSVP</button>
</div>

<!-- ================= BUDGET ================= -->
<div id="budget" class="panel active">

  <div class="card">
    <table width="100%">
      <thead>
        <tr>
          <th>Voce</th>
          <th>Min</th>
          <th>Max</th>
          <th>Stimato</th>
          <th>Speso</th>
          <th>Note</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="budgetBody"></tbody>
    </table>
  </div>

</div>

<!-- ================= TIMELINE ================= -->
<div id="timeline" class="panel">
  <div class="card">Timeline qui</div>
</div>

<!-- ================= FORNITORI ================= -->
<div id="fornitori" class="panel">
  <div class="card">Fornitori qui</div>
</div>

<!-- ================= RSVP ================= -->
<div id="rsvp" class="panel">

  <div class="card">
    <div id="rsvp-status"></div>
    <div id="guests"></div>
    <div id="allergy-list"></div>
  </div>

</div>

<script>

// ===== TAB =====
function tab(id, el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

// ===== BUDGET =====
let state = {
  budget:[
    {voce:"Location",min:100,max:200,stimato:150,speso:0,note:""},
    {voce:"Foto",min:500,max:800,stimato:650,speso:0,note:""}
  ]
};

function renderBudget(){
  const body = document.getElementById("budgetBody");

  body.innerHTML = state.budget.map((r,i)=>`
    <tr>
      <td>${r.voce}</td>
      <td>${r.min}</td>
      <td>${r.max}</td>
      <td>${r.stimato}</td>

      <td>
        <input type="number" value="${r.speso}"
          onchange="updateSpeso(${i},this.value)">
      </td>

      <td>
        <input value="${r.note}"
          onchange="updateNote(${i},this.value)">
      </td>

      <td>
        <button onclick="deleteBudgetItem(${i})">✕</button>
      </td>
    </tr>
  `).join('');
}

function updateSpeso(i,v){
  state.budget[i].speso = parseFloat(v)||0;
  renderBudget();
}

function updateNote(i,v){
  state.budget[i].note = v;
}

function deleteBudgetItem(i){
  state.budget.splice(i,1);
  renderBudget();
}

// ===== RSVP FIX =====
async function loadRSVP(){
  const url="https://opensheet.elk.sh/1NgE7A6qhfGfxz5Wu9llxuKYlEUagRL8O5vFxn39fLnE/RSVP";

  try{
    const res = await fetch(url);
    const data = await res.json();

    let allergyMap={};

    document.getElementById("guests").innerHTML =
      data.map(r=>{
        const a = (r.Allergie||"").trim();

        if(a && a.toLowerCase()!=="no"){
          allergyMap[a]=(allergyMap[a]||[]).concat(r.Nome);
        }

        return `<div>${r.Nome||""} - ${r.Partecipazione||""}</div>`;
      }).join("");

    document.getElementById("allergy-list").innerHTML =
      Object.entries(allergyMap)
        .map(([k,v])=>`<b>${k}</b>: ${v.join(", ")}`)
        .join("<br>");

  }catch(e){
    document.getElementById("rsvp-status").textContent="Errore RSVP";
  }
}

// INIT
renderBudget();
loadRSVP();

</script>

</body>
</html>
